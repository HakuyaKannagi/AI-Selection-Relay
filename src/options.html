<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>AI Settings</title></head>
<body>
  <h2>AIサイト設定</h2>
  <div id="ai-list"></div>
  <hr>
  <h4>新規追加</h4>
  <input type="text" id="name" placeholder="AI名 (例: Gemini)">
  <input type="text" id="url" placeholder="URL (例: https://gemini.google.com/app)">
  <input type="text" id="selector" placeholder="セレクタ (例: div.textarea)">
  <input type="text" id="prefix" placeholder="定型文 (例: 以下の文章を要約して：)">
  <button id="add">追加保存</button>

  <script src="options.js"></script>
</body>
</html>
